<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FarmDirect</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/auth.js" defer></script>
</head>
<body>
<div class="container">
    <div class="card" style="max-width: 560px; margin: 0 auto;">
        <span class="badge">Login</span>
        <h1>Welcome to FarmDirect</h1>
        <p class="muted">Use your farmer or customer account to continue.</p>
        <div id="flash-message" class="flash"></div>
        <form method="post" action="api/auth/login" class="grid" style="gap: 16px;">
            <div>
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" placeholder="Enter Your Email" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p class="muted" style="margin-top: 16px;">New here? <a href="signup.html">Create an account</a></p>
    </div>
</div>
</body>
</html>
